name = "polar-mcp-server-josh-s"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for OAuth state and tokens
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "e59805cc585748aebcb18ec713c267b0"

# Durable Objects for MCP sessions
[durable_objects]
bindings = [{ name = "MCP_OBJECT", class_name = "MyMCP" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MyMCP"]

# Environment variables (set via wrangler secret)
# wrangler secret put POLAR_CLIENT_ID
# wrangler secret put POLAR_CLIENT_SECRET

[vars]
# Non-sensitive variables can go here

# Development settings
[env.dev]
name = "polar-mcp-server-dev"

[[env.dev.kv_namespaces]]
binding = "OAUTH_KV"
id = "YOUR_DEV_KV_NAMESPACE_ID"  # Replace after creating: wrangler kv namespace create OAUTH_KV --env dev

[env.dev.durable_objects]
bindings = [{ name = "MCP_OBJECT", class_name = "MyMCP" }]

[[env.dev.migrations]]
tag = "v1"
new_sqlite_classes = ["MyMCP"]
